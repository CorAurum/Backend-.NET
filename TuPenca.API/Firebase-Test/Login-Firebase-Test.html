<!DOCTYPE html>
<html>
<head>
  <title>Firebase Test</title>
</head>
<body>

<h2>Login con Google</h2>
<button onclick="login()">Login</button>

<script type="module">
	import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
	import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAbR3RzmZ7CqMz-HobMTy7-eieXudZY6n8",
        authDomain: "tupencauyproject.firebaseapp.com",
        projectId: "tupencauyproject",
        storageBucket: "tupencauyproject.firebasestorage.app",
        messagingSenderId: "820549641519",
        appId: "1:820549641519:web:77f60df1b3fd6f72ec2dda",
        measurementId: "G-3ER404YL48"
    };

	const app = initializeApp(firebaseConfig);
	const auth = getAuth(app);

	async function login() {
	try {
	  const provider = new GoogleAuthProvider();
	  const result = await signInWithPopup(auth, provider);

	  const user = result.user;
	  const idToken = await user.getIdToken();

	  console.log("ID TOKEN:", idToken);

	  alert("Token generado. Mirá la consola (F12)");
	} catch (error) {
	  console.error(error);
	  alert("Error: " + error.message);
	}
	}

	window.login = login;
</script>

</body>
</html>
